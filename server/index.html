<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Factorio Patch Overlay</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ion-rangeslider/2.3.0/css/ion.rangeSlider.min.css" />
    <style>
      #controls-panel {
        max-height: calc(100vh - 56px);
        overflow-y: auto;
        padding-right: 6px;
      }

      @media (max-width: 980px) {
        #controls-panel {
          max-height: none;
          overflow-y: visible;
        }
      }
    </style>
  </head>
  <body>
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 8px;">
      <h1 style="margin: 0;">Factorio Patch Overlay</h1>
      <button id="toggle-controls-btn" type="button">Collapse Controls</button>
    </div>
    <div style="display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-start;">
      <div id="image-panel" style="flex: 1 1 640px; min-width: 320px;">
        <img id="preview" alt="Screenshot preview" style="max-width: 100%; margin-top: 8px;" />
      </div>
      <div id="controls-panel" style="flex: 1 1 420px; min-width: 320px;">
        <div>
          <button id="upload-btn" type="button">Upload Screenshot</button>
          <button id="latest-btn" type="button">Load Latest Screenshot</button>
          <button id="clipboard-btn" type="button">Load From Clipboard</button>
          <button id="reload-btn" type="button">Reload</button>
          <button id="target-filter-btn" type="button">Color Filter</button>
          <button id="edges-btn" type="button">Edge Detect</button>
          <button id="edges-overlay-btn" type="button">Edge Overlay</button>
          <input id="file-input" type="file" accept="image/*" hidden />
        </div>
        <div style="margin-top: 8px; padding: 8px; border: 1px solid #ccc;">
          <strong>Color Blob Pattern Overlay</strong>
          <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
            <label for="color-blob-threshold" style="width: 72px;">Similarity</label>
            <span id="color-blob-threshold-value" style="width: 28px; text-align: right;">28</span>
            <input id="color-blob-threshold" type="range" min="0" max="255" value="28" style="flex: 1;" />
          </div>
          <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
            <label for="color-blob-radius" style="width: 72px;">Radius</label>
            <span id="color-blob-radius-value" style="width: 28px; text-align: right;">2</span>
            <input id="color-blob-radius" type="range" min="1" max="8" value="2" style="flex: 1;" />
          </div>
          <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
            <label for="color-blob-aspect" style="width: 72px;">Aspect</label>
            <span id="color-blob-aspect-value" style="width: 28px; text-align: right;">4.0</span>
            <input id="color-blob-aspect" type="range" min="1" max="10" step="0.1" value="4.0" style="flex: 1;" />
          </div>
          <div style="margin-top: 8px;">
            <label>
              <input id="color-blob-run-pattern" type="checkbox" checked />
              Run color blob pattern overlay
            </label>
          </div>
          <div style="margin-top: 8px;">
            <label>
              <input id="color-blob-use-target-filter" type="checkbox" />
              Constrain to target color +/- tolerance
            </label>
          </div>
          <div style="margin-top: 8px; font-weight: 600;">RGB Inclusion Filters</div>
          <div id="color-blob-include-filters" style="margin-top: 6px; display: flex; flex-direction: column; gap: 8px;"></div>
          <div style="margin-top: 6px;">
            <button id="color-blob-add-filter" type="button" title="Add inclusion filter">+</button>
          </div>
          <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
            <label for="color-blob-min-area" style="width: 72px;">Min Area</label>
            <input id="color-blob-min-area" type="number" min="1" value="90" style="width: 96px;" />
            <label for="color-blob-max-area" style="width: 72px;">Max Area</label>
            <input id="color-blob-max-area" type="number" min="1" value="1000" style="width: 110px;" />
            <button id="color-blob-btn" type="button">Pattern Blobs</button>
          </div>
          <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
            <label>
              <input id="color-blob-resource-mask" type="checkbox" />
              Limit search to pixels matching resources_separated_by_color_ranges.json
            </label>
          </div>
        </div>
        <div style="margin-top: 8px;">
          <label for="edge-threshold">Edge Threshold:</label>
          <input
            id="edge-threshold"
            type="range"
            min="0"
            max="255"
            value="80"
            style="display: block; width: 100%; margin-top: 6px;"
          />
          <span id="edge-threshold-value">80</span>
          <label style="margin-left: 16px;">
            <input id="checker-only" type="checkbox" />
            Checkerboard Only
          </label>
        </div>
        <div style="margin-top: 8px; padding: 8px; border: 1px solid #ccc;">
          <strong>K-Means Filter</strong>
          <div style="margin-top: 8px; display: flex; align-items: center; gap: 8px;">
            <label for="kmeans-k" style="width: 20px;">K</label>
            <span id="kmeans-k-value" style="width: 24px; text-align: right;">5</span>
            <input id="kmeans-k" type="range" min="2" max="16" value="5" style="flex: 1;" />
            <button id="kmeans-btn" type="button">Apply K-Means</button>
          </div>
        </div>
        <div style="margin-top: 8px; padding: 8px; border: 1px solid #ccc;">
          <strong>RGB Range Filter</strong>
          <div style="display: flex; gap: 16px; margin-top: 8px; align-items: center;">
            <div style="flex: 1; display: flex; align-items: center; gap: 8px;">
              <label for="min-color-picker" style="width: 86px;">Lower Color</label>
              <input id="min-color-picker" type="color" value="#000000" />
            </div>
            <div style="flex: 1; display: flex; align-items: center; gap: 8px;">
              <label for="max-color-picker" style="width: 86px;">Upper Color</label>
              <input id="max-color-picker" type="color" value="#ffffff" />
            </div>
          </div>
          <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
            <label for="rgb-range-r" style="width: 46px;">R</label>
            <span id="rgb-range-r-value" style="width: 90px; text-align: right;">0-255</span>
            <input id="rgb-range-r" type="text" value="" style="flex: 1;" />
          </div>
          <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
            <label for="rgb-range-g" style="width: 46px;">G</label>
            <span id="rgb-range-g-value" style="width: 90px; text-align: right;">0-255</span>
            <input id="rgb-range-g" type="text" value="" style="flex: 1;" />
          </div>
          <div style="display: flex; align-items: center; gap: 8px; margin-top: 8px;">
            <label for="rgb-range-b" style="width: 46px;">B</label>
            <span id="rgb-range-b-value" style="width: 90px; text-align: right;">0-255</span>
            <input id="rgb-range-b" type="text" value="" style="flex: 1;" />
          </div>
        </div>
        <div style="margin-top: 8px; padding: 8px; border: 1px solid #ccc;">
          <strong>Target Color +/- Filter</strong>
          <div style="display: flex; align-items: center; gap: 10px; margin-top: 8px;">
            <label for="target-color-picker" style="width: 84px;">Color</label>
            <input id="target-color-picker" type="color" value="#808080" />
          </div>
          <div style="display: flex; align-items: center; gap: 10px; margin-top: 8px;">
            <label for="target-tolerance" style="width: 84px;">Tolerance</label>
            <span id="target-tolerance-value" style="width: 32px; text-align: right;">30</span>
            <input id="target-tolerance" type="range" min="0" max="128" value="30" style="flex: 1;" />
          </div>
        </div>
        <div style="margin-top: 8px; padding: 8px; border: 1px solid #ccc;">
          <strong>Save Resource Range</strong>
          <div id="resource-buttons" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;"></div>
          <button id="copy-resource-json-btn" type="button" style="margin-top: 8px;">Copy JSON</button>
          <button id="update-resource-json-btn" type="button" style="margin-top: 8px; margin-left: 8px;">Update JSON File</button>
          <pre id="resource-ranges-output" style="margin-top: 8px; max-height: 180px; overflow: auto; background: #f5f5f5; padding: 8px;">{}</pre>
        </div>
        <div style="margin-top: 8px; padding: 8px; border: 1px solid #ccc;">
          <strong>Resource Patch Overlay</strong>
          <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
            <label for="overlay-resource-select" style="width: 72px;">Resource</label>
            <select id="overlay-resource-select" style="flex: 1;"></select>
          </div>
          <div style="display: flex; gap: 8px; align-items: center; margin-top: 8px;">
            <label for="overlay-min-area" style="width: 72px;">Min Area</label>
            <input id="overlay-min-area" type="number" min="1" value="120" style="width: 96px;" />
            <button id="overlay-resource-btn" type="button">Overlay Patches</button>
          </div>
        </div>
        <div style="margin-top: 8px;">
          <label for="checker-density">Pixel Density:</label>
          <input
            id="checker-density"
            type="range"
            min="0"
            max="1"
            step="0.01"
            value="0.45"
            style="display: block; width: 100%; margin-top: 6px;"
          />
          <span id="checker-density-value">0.45</span>
        </div>
        <div id="status" style="margin-top: 8px; color: #b00020;"></div>
      </div>
    </div>
    <canvas id="canvas" style="display:none;"></canvas>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ion-rangeslider/2.3.0/js/ion.rangeSlider.min.js"></script>
    <script type="module">
      const uploadBtn = document.getElementById("upload-btn");
      const toggleControlsBtn = document.getElementById("toggle-controls-btn");
      const latestBtn = document.getElementById("latest-btn");
      const clipboardBtn = document.getElementById("clipboard-btn");
      const reloadBtn = document.getElementById("reload-btn");
      const targetFilterBtn = document.getElementById("target-filter-btn");
      const edgesBtn = document.getElementById("edges-btn");
      const edgesOverlayBtn = document.getElementById("edges-overlay-btn");
      const fileInput = document.getElementById("file-input");
      const preview = document.getElementById("preview");
      const status = document.getElementById("status");
      const canvas = document.getElementById("canvas");
      const imagePanel = document.getElementById("image-panel");
      const controlsPanel = document.getElementById("controls-panel");
      const edgeThreshold = document.getElementById("edge-threshold");
      const edgeThresholdValue = document.getElementById("edge-threshold-value");
      const checkerOnly = document.getElementById("checker-only");
      const checkerDensity = document.getElementById("checker-density");
      const checkerDensityValue = document.getElementById("checker-density-value");
      const kmeansK = document.getElementById("kmeans-k");
      const kmeansKValue = document.getElementById("kmeans-k-value");
      const kmeansBtn = document.getElementById("kmeans-btn");
      const rgbRangeR = document.getElementById("rgb-range-r");
      const rgbRangeG = document.getElementById("rgb-range-g");
      const rgbRangeB = document.getElementById("rgb-range-b");
      const rgbRangeRValue = document.getElementById("rgb-range-r-value");
      const rgbRangeGValue = document.getElementById("rgb-range-g-value");
      const rgbRangeBValue = document.getElementById("rgb-range-b-value");
      const minColorPicker = document.getElementById("min-color-picker");
      const maxColorPicker = document.getElementById("max-color-picker");
      const targetColorPicker = document.getElementById("target-color-picker");
      const targetTolerance = document.getElementById("target-tolerance");
      const targetToleranceValue = document.getElementById("target-tolerance-value");
      const resourceButtons = document.getElementById("resource-buttons");
      const resourceRangesOutput = document.getElementById("resource-ranges-output");
      const copyResourceJsonBtn = document.getElementById("copy-resource-json-btn");
      const updateResourceJsonBtn = document.getElementById("update-resource-json-btn");
      const overlayResourceSelect = document.getElementById("overlay-resource-select");
      const overlayMinArea = document.getElementById("overlay-min-area");
      const overlayResourceBtn = document.getElementById("overlay-resource-btn");
      const colorBlobThreshold = document.getElementById("color-blob-threshold");
      const colorBlobThresholdValue = document.getElementById("color-blob-threshold-value");
      const colorBlobRadius = document.getElementById("color-blob-radius");
      const colorBlobRadiusValue = document.getElementById("color-blob-radius-value");
      const colorBlobAspect = document.getElementById("color-blob-aspect");
      const colorBlobAspectValue = document.getElementById("color-blob-aspect-value");
      const colorBlobRunPattern = document.getElementById("color-blob-run-pattern");
      const colorBlobUseTargetFilter = document.getElementById("color-blob-use-target-filter");
      const colorBlobIncludeFilters = document.getElementById("color-blob-include-filters");
      const colorBlobAddFilter = document.getElementById("color-blob-add-filter");
      const colorBlobMinArea = document.getElementById("color-blob-min-area");
      const colorBlobMaxArea = document.getElementById("color-blob-max-area");
      const colorBlobResourceMask = document.getElementById("color-blob-resource-mask");
      const colorBlobBtn = document.getElementById("color-blob-btn");
      const resourceTypes = [
        "iron-ore",
        "copper-ore",
        "coal",
        "stone",
        "uranium-ore",
        "crude-oil",
        "water",
        "trees",
      ];
      const resourceRanges = {};
      let overlayRangesCache = null;
      const samplerCanvas = document.createElement("canvas");
      const samplerCtx = samplerCanvas.getContext("2d", { willReadFrequently: true });
      let samplerReady = false;
      let samplerLoadToken = 0;
      let overlayRedrawTimer = null;
      let colorBlobRedrawTimer = null;
      let hoverEvent = null;
      let hoverQueued = false;
      let sampledX = null;
      let sampledY = null;
      let targetFilterActive = false;
      let targetFilterBaseSrc = "";
      let originalSrc = "";
      let colorBlobFilterIdCounter = 0;
      let rgbRangeRSlider = null;
      let rgbRangeGSlider = null;
      let rgbRangeBSlider = null;

      uploadBtn.addEventListener("click", () => {
        fileInput.click();
      });

      fileInput.addEventListener("change", () => {
        const file = fileInput.files && fileInput.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        preview.src = url;
        originalSrc = url;
        status.textContent = "";
      });

      latestBtn.addEventListener("click", async () => {
        try {
          const resp = await fetch(`/api/latest-screenshot?t=${Date.now()}`);
          if (!resp.ok) {
            const msg = await resp.text();
            status.textContent = `Failed to load latest screenshot: ${msg}`;
            return;
          }
          const blob = await resp.blob();
          const url = URL.createObjectURL(blob);
          preview.src = url;
          originalSrc = url;
          status.textContent = "";
        } catch (err) {
          status.textContent = `Error loading latest screenshot: ${err}`;
        }
      });

      clipboardBtn.addEventListener("click", async () => {
        try {
          if (!navigator.clipboard || !navigator.clipboard.read) {
            status.textContent = "Clipboard image access not supported in this browser.";
            return;
          }
          const items = await navigator.clipboard.read();
          for (const item of items) {
            for (const type of item.types) {
              if (type.startsWith("image/")) {
                const blob = await item.getType(type);
                const url = URL.createObjectURL(blob);
                preview.src = url;
                originalSrc = url;
                status.textContent = "";
                return;
              }
            }
          }
          status.textContent = "Clipboard does not contain an image.";
        } catch (err) {
          status.textContent = `Clipboard error: ${err}`;
        }
      });
      reloadBtn.addEventListener("click", () => {
        if (!originalSrc && !preview.src) {
          status.textContent = "Load an image first.";
          return;
        }
        if (targetFilterActive) {
          setTargetFilterActive(false);
        }
        preview.src = originalSrc || preview.src;
        status.textContent = "";
      });
      toggleControlsBtn.addEventListener("click", () => {
        const hidden = controlsPanel.style.display === "none";
        if (hidden) {
          controlsPanel.style.display = "";
          imagePanel.style.flex = "1 1 640px";
          toggleControlsBtn.textContent = "Collapse Controls";
        } else {
          controlsPanel.style.display = "none";
          imagePanel.style.flex = "1 1 100%";
          toggleControlsBtn.textContent = "Show Controls";
        }
      });

      edgeThreshold.addEventListener("input", () => {
        edgeThresholdValue.textContent = edgeThreshold.value;
        edgesOverlayBtn.click();
      });
      checkerDensity.addEventListener("input", () => {
        checkerDensityValue.textContent = Number.parseFloat(checkerDensity.value).toFixed(2);
        if (checkerOnly.checked) {
          edgesOverlayBtn.click();
        }
        if (preview.src && overlayResourceSelect.value) {
          if (overlayRedrawTimer) {
            clearTimeout(overlayRedrawTimer);
          }
          overlayRedrawTimer = setTimeout(() => {
            overlayRedrawTimer = null;
            overlayResourcePatches();
          }, 120);
        }
      });
      kmeansK.addEventListener("input", () => {
        kmeansKValue.textContent = kmeansK.value;
      });

      function nearestCentroidIndex(r, g, b, centroids) {
        let bestIdx = 0;
        let bestDist = Number.POSITIVE_INFINITY;
        for (let i = 0; i < centroids.length; i++) {
          const dr = r - centroids[i][0];
          const dg = g - centroids[i][1];
          const db = b - centroids[i][2];
          const dist = dr * dr + dg * dg + db * db;
          if (dist < bestDist) {
            bestDist = dist;
            bestIdx = i;
          }
        }
        return bestIdx;
      }

      function applyKMeansFilter() {
        if (!preview.src) {
          status.textContent = "Load an image first.";
          return;
        }
        status.textContent = "Applying K-means filter...";
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          const ctx = canvas.getContext("2d", { willReadFrequently: true });
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const { data, width, height } = imageData;
          const pixelCount = width * height;
          if (pixelCount === 0) {
            status.textContent = "Image has no pixels.";
            return;
          }

          const k = parseInt(kmeansK.value, 10);
          const sampleTarget = 20000;
          const stride = Math.max(1, Math.floor(pixelCount / sampleTarget));
          const samples = [];
          for (let i = 0; i < pixelCount; i += stride) {
            const idx = i * 4;
            samples.push([data[idx], data[idx + 1], data[idx + 2]]);
          }
          if (samples.length === 0) {
            samples.push([data[0], data[1], data[2]]);
          }

          const centroids = [];
          for (let c = 0; c < k; c++) {
            const sampleIdx = Math.floor((c * (samples.length - 1)) / Math.max(1, k - 1));
            centroids.push(samples[sampleIdx].slice());
          }

          const iterations = 8;
          for (let iter = 0; iter < iterations; iter++) {
            const sums = Array.from({ length: k }, () => [0, 0, 0]);
            const counts = new Uint32Array(k);
            for (let i = 0; i < samples.length; i++) {
              const r = samples[i][0];
              const g = samples[i][1];
              const b = samples[i][2];
              const cIdx = nearestCentroidIndex(r, g, b, centroids);
              sums[cIdx][0] += r;
              sums[cIdx][1] += g;
              sums[cIdx][2] += b;
              counts[cIdx] += 1;
            }
            for (let c = 0; c < k; c++) {
              if (counts[c] > 0) {
                centroids[c][0] = Math.round(sums[c][0] / counts[c]);
                centroids[c][1] = Math.round(sums[c][1] / counts[c]);
                centroids[c][2] = Math.round(sums[c][2] / counts[c]);
              } else {
                const sampleIdx = (iter * 977 + c * 101) % samples.length;
                centroids[c] = samples[sampleIdx].slice();
              }
            }
          }

          for (let i = 0; i < pixelCount; i++) {
            const idx = i * 4;
            const cIdx = nearestCentroidIndex(data[idx], data[idx + 1], data[idx + 2], centroids);
            data[idx] = centroids[cIdx][0];
            data[idx + 1] = centroids[cIdx][1];
            data[idx + 2] = centroids[cIdx][2];
            data[idx + 3] = 255;
          }

          ctx.putImageData(imageData, 0, 0);
          preview.src = canvas.toDataURL("image/png");
          status.textContent = "";
        };
        img.onerror = () => {
          status.textContent = "Failed to load image for K-means filter.";
        };
        img.src = originalSrc || preview.src;
      }
      kmeansBtn.addEventListener("click", applyKMeansFilter);
      function formatRangeLabel(from, to) {
        return `${from}-${to}`;
      }
      function getMainRgbBounds() {
        return {
          lowR: rgbRangeRSlider.result.from,
          highR: rgbRangeRSlider.result.to,
          lowG: rgbRangeGSlider.result.from,
          highG: rgbRangeGSlider.result.to,
          lowB: rgbRangeBSlider.result.from,
          highB: rgbRangeBSlider.result.to,
        };
      }
      function updateRgbSliderLabels() {
        const bounds = getMainRgbBounds();
        rgbRangeRValue.textContent = formatRangeLabel(bounds.lowR, bounds.highR);
        rgbRangeGValue.textContent = formatRangeLabel(bounds.lowG, bounds.highG);
        rgbRangeBValue.textContent = formatRangeLabel(bounds.lowB, bounds.highB);
        minColorPicker.value = rgbToHex(
          bounds.lowR,
          bounds.lowG,
          bounds.lowB
        );
        maxColorPicker.value = rgbToHex(
          bounds.highR,
          bounds.highG,
          bounds.highB
        );
      }
      function createDoubleRangeSlider(input, valueLabel, options, onChange) {
        $(input).ionRangeSlider({
          skin: "round",
          type: "double",
          min: options.min,
          max: options.max,
          from: options.from,
          to: options.to,
          grid: false,
          onStart(data) {
            valueLabel.textContent = formatRangeLabel(data.from, data.to);
          },
          onChange(data) {
            valueLabel.textContent = formatRangeLabel(data.from, data.to);
            onChange(data);
          },
        });
        return $(input).data("ionRangeSlider");
      }
      function initializeMainRgbRangeSliders() {
        const handleChange = () => {
          updateRgbSliderLabels();
          applyColorFilter();
        };
        rgbRangeRSlider = createDoubleRangeSlider(rgbRangeR, rgbRangeRValue, {
          min: 0,
          max: 255,
          from: 0,
          to: 255,
        }, handleChange);
        rgbRangeGSlider = createDoubleRangeSlider(rgbRangeG, rgbRangeGValue, {
          min: 0,
          max: 255,
          from: 0,
          to: 255,
        }, handleChange);
        rgbRangeBSlider = createDoubleRangeSlider(rgbRangeB, rgbRangeBValue, {
          min: 0,
          max: 255,
          from: 0,
          to: 255,
        }, handleChange);
        updateRgbSliderLabels();
      }
      function channelToHex(n) {
        return n.toString(16).padStart(2, "0");
      }
      function rgbToHex(r, g, b) {
        return `#${channelToHex(r)}${channelToHex(g)}${channelToHex(b)}`;
      }
      function scheduleColorBlobRedraw() {
        if (!preview.src) {
          return;
        }
        if (colorBlobRedrawTimer) {
          clearTimeout(colorBlobRedrawTimer);
        }
        colorBlobRedrawTimer = setTimeout(() => {
          colorBlobRedrawTimer = null;
          applyColorBlobPatterns();
        }, 120);
      }
      function buildColorBlobRangeControl(channel, initialLow, initialHigh) {
        const wrap = document.createElement("div");
        wrap.style.display = "flex";
        wrap.style.alignItems = "center";
        wrap.style.gap = "6px";
        wrap.style.flex = "1";

        const label = document.createElement("label");
        label.textContent = channel;
        label.style.width = "40px";

        const valueSpan = document.createElement("span");

              }
              if (dx * dx + dy * dy <= radius * radius) {
                offsets.push([dx, dy]);
              }
            }
          }

          let paintedBlobs = 0;
          for (let i = 0; i < pixelCount; i++) {
            if (visited[i]) {
              continue;
            }
            visited[i] = 1;
            if (resourceMask && !resourceMask[i]) {
              continue;
            }
            const seedIdx = i * 4;
            const seedR = data[seedIdx];
            const seedG = data[seedIdx + 1];
            const seedB = data[seedIdx + 2];
            if (!pixelMatchesIncludeFilters(seedR, seedG, seedB, includeFilters)) {
              continue;
            }
            if (useTargetFilter && !pixelMatchesTargetTolerance(seedR, seedG, seedB)) {
              continue;
            }

            let qHead = 0;
            let qTail = 0;
            queue[qTail++] = i;
            const component = [i];
            while (qHead < qTail) {
              const cur = queue[qHead++];
              const cx = cur % width;
              const cy = (cur / width) | 0;
              for (const offset of offsets) {
                const nx = cx + offset[0];
                const ny = cy + offset[1];
                if (nx < 0 || ny < 0 || nx >= width || ny >= height) {
                  continue;
                }
                const ni = ny * width + nx;
                if (visited[ni]) {
                  continue;
                }
                if (resourceMask && !resourceMask[ni]) {
                  continue;
                }
                const di = ni * 4;
                if (!pixelMatchesIncludeFilters(data[di], data[di + 1], data[di + 2], includeFilters)) {
                  continue;
                }
                if (useTargetFilter && !pixelMatchesTargetTolerance(data[di], data[di + 1], data[di + 2])) {
                  continue;
                }
                const dr = Math.abs(data[di] - seedR);
                const dg = Math.abs(data[di + 1] - seedG);
                const db = Math.abs(data[di + 2] - seedB);
                if (dr > similarity || dg > similarity || db > similarity) {
                  continue;
                }
                visited[ni] = 1;
                queue[qTail++] = ni;
                component.push(ni);
              }
            }

            let minX = width;
            let minY = height;
            let maxX = 0;
            let maxY = 0;
            for (const pix of component) {
              const x = pix % width;
              const y = (pix / width) | 0;
              if (x < minX) minX = x;
              if (x > maxX) maxX = x;
              if (y < minY) minY = y;
              if (y > maxY) maxY = y;
            }
            const boxW = Math.max(1, maxX - minX + 1);
            const boxH = Math.max(1, maxY - minY + 1);
            const aspect = Math.max(boxW / boxH, boxH / boxW);

            if (component.length < minArea || component.length > maxArea || aspect > maxAspect) {
              continue;
            }
            paintedBlobs++;
            const blobId = paintedBlobs;
            for (const pix of component) {
              const x = pix % width;
              const y = (pix / width) | 0;
              if (!shouldPaintBlobPattern(x, y, blobId)) {
                continue;
              }
              const di = pix * 4;
              data[di] = 255;
              data[di + 1] = 230;
              data[di + 2] = 30;
              data[di + 3] = 255;
            }
          }

          ctx.putImageData(imageData, 0, 0);
          preview.src = canvas.toDataURL("image/png");
          status.textContent = `Pattern overlay complete: ${paintedBlobs} blob(s).`;
        };
        img.onerror = () => {
          status.textContent = "Failed to load image for color blob overlay.";
        };
        img.src = src;
      }
      function saveRangeForResource(resourceName) {
        resourceRanges[resourceName] = getCurrentColorRange();
        renderResourceRanges();
        overlayRangesCache = null;
        renderOverlayResourceOptions(resourceRanges);
      }
      function initializeResourceButtons() {
        for (const resource of resourceTypes) {
          const button = document.createElement("button");
          button.type = "button";
          button.textContent = resource;
          button.addEventListener("click", () => {
            saveRangeForResource(resource);
          });
          resourceButtons.appendChild(button);
        }
        renderResourceRanges();
      }
      copyResourceJsonBtn.addEventListener("click", async () => {
        const json = JSON.stringify(resourceRanges, null, 2);
        try {
          await navigator.clipboard.writeText(json);
          status.textContent = "Resource range JSON copied to clipboard.";
        } catch (err) {
          status.textContent = `Failed to copy JSON: ${err}`;
        }
      });
      updateResourceJsonBtn.addEventListener("click", async () => {
        try {
          const resp = await fetch("/api/update-resource-ranges", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(resourceRanges),
          });
          if (!resp.ok) {
            const msg = await resp.text();
            status.textContent = `Failed to update JSON file: ${msg}`;
            return;
          }
          overlayRangesCache = null;
          status.textContent = "Updated resources_separated_by_color_ranges.json";
        } catch (err) {
          status.textContent = `Failed to update JSON file: ${err}`;
        }
      });
      overlayResourceBtn.addEventListener("click", () => {
        overlayResourcePatches();
      });
      colorBlobBtn.addEventListener("click", () => {
        applyColorBlobPatterns();
      });
      colorBlobAddFilter.addEventListener("click", () => {
        addColorBlobIncludeFilter();
        scheduleColorBlobRedraw();
      });
      colorBlobRunPattern.addEventListener("change", () => {
        scheduleColorBlobRedraw();
      });
      colorBlobUseTargetFilter.addEventListener("change", () => {
        scheduleColorBlobRedraw();
      });
      colorBlobThreshold.addEventListener("input", () => {
        colorBlobThresholdValue.textContent = colorBlobThreshold.value;
        scheduleColorBlobRedraw();
      });
      colorBlobRadius.addEventListener("input", () => {
        colorBlobRadiusValue.textContent = colorBlobRadius.value;
        scheduleColorBlobRedraw();
      });
      colorBlobAspect.addEventListener("input", () => {
        colorBlobAspectValue.textContent = Number.parseFloat(colorBlobAspect.value).toFixed(1);
        scheduleColorBlobRedraw();
      });
      colorBlobResourceMask.addEventListener("change", () => {
        if (preview.src) {
          applyColorBlobPatterns();
        }
      });
      targetTolerance.addEventListener("input", () => {
        targetToleranceValue.textContent = targetTolerance.value;
        if (targetFilterActive && targetFilterBaseSrc) {
          applyTargetColorFilter(targetFilterBaseSrc);
        }
        if (colorBlobUseTargetFilter.checked) {
          scheduleColorBlobRedraw();
        }
      });
      targetColorPicker.addEventListener("input", () => {
        updateTargetFilterButtonStyle();
        if (targetFilterActive && targetFilterBaseSrc) {
          applyTargetColorFilter(targetFilterBaseSrc);
        }
        if (colorBlobUseTargetFilter.checked) {
          scheduleColorBlobRedraw();
        }
      });
      targetFilterBtn.addEventListener("click", () => {
        setTargetFilterActive(!targetFilterActive);
      });
      window.addEventListener("keydown", (evt) => {
        if (evt.code !== "Space" || evt.repeat) {
          return;
        }
        if (isFormFieldFocused()) {
          return;
        }
        evt.preventDefault();
        setTargetFilterActive(!targetFilterActive);
      });
      window.addEventListener("keydown", (evt) => {
        if (evt.repeat || isFormFieldFocused()) {
          return;
        }
        if (evt.code === "ArrowLeft") {
          evt.preventDefault();
          nudgeSampledPixel(-1, 0);
        } else if (evt.code === "ArrowRight") {
          evt.preventDefault();
          nudgeSampledPixel(1, 0);
        } else if (evt.code === "ArrowUp") {
          evt.preventDefault();
          nudgeSampledPixel(0, -1);
        } else if (evt.code === "ArrowDown") {
          evt.preventDefault();
          nudgeSampledPixel(0, 1);
        }
      });
      minColorPicker.addEventListener("input", () => {
        const rgb = hexToRgb(minColorPicker.value);
        rgbRangeRSlider.update({ from: rgb.r });
        rgbRangeGSlider.update({ from: rgb.g });
        rgbRangeBSlider.update({ from: rgb.b });
        updateRgbSliderLabels();
        applyColorFilter();
      });
      maxColorPicker.addEventListener("input", () => {
        const rgb = hexToRgb(maxColorPicker.value);
        rgbRangeRSlider.update({ to: rgb.r });
        rgbRangeGSlider.update({ to: rgb.g });
        rgbRangeBSlider.update({ to: rgb.b });
        updateRgbSliderLabels();
        applyColorFilter();
      });
      initializeMainRgbRangeSliders();
      targetToleranceValue.textContent = targetTolerance.value;
      checkerDensityValue.textContent = Number.parseFloat(checkerDensity.value).toFixed(2);
      colorBlobThresholdValue.textContent = colorBlobThreshold.value;
      colorBlobRadiusValue.textContent = colorBlobRadius.value;
      colorBlobAspectValue.textContent = Number.parseFloat(colorBlobAspect.value).toFixed(1);
      addColorBlobIncludeFilter();
      updateTargetFilterButtonStyle();
      initializeResourceButtons();
      getRangesForOverlay()
        .then((ranges) => {
          renderOverlayResourceOptions(ranges);
        })
        .catch(() => {
          renderOverlayResourceOptions(resourceRanges);
        });

      function buildCheckerMask(gray, width, height, delta = 20, windowSize = 5, densityThreshold = 0.55) {
        const base = new Uint8ClampedArray(width * height);
        for (let y = 0; y < height - 1; y++) {
          for (let x = 0; x < width - 1; x++) {
            const a = gray[y * width + x];
            const b = gray[y * width + (x + 1)];
            const c = gray[(y + 1) * width + x];
            const d = gray[(y + 1) * width + (x + 1)];
            const maxv = Math.max(a, b, c, d);
            const minv = Math.min(a, b, c, d);
            if (maxv - minv >= delta) {
              const idx = y * width + x;
              base[idx] = 1;
              base[idx + 1] = 1;
              base[idx + width] = 1;
              base[idx + width + 1] = 1;
            }
          }
        }
        // Box-filter density
        const mask = new Uint8ClampedArray(width * height);
        const r = Math.floor(windowSize / 2);
        const area = windowSize * windowSize;
        for (let y = r; y < height - r; y++) {
          for (let x = r; x < width - r; x++) {
            let sum = 0;
            for (let yy = -r; yy <= r; yy++) {
              for (let xx = -r; xx <= r; xx++) {
                sum += base[(y + yy) * width + (x + xx)];
              }
            }
            if (sum / area >= densityThreshold) {
              mask[y * width + x] = 1;
            }
          }
        }
        return mask;
      }

      edgesBtn.addEventListener("click", async () => {
        if (!preview.src) {
          status.textContent = "Load an image first.";
          return;
        }
        status.textContent = "";
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          const ctx = canvas.getContext("2d", { willReadFrequently: true });
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const { data, width, height } = imageData;
          const gray = new Uint8ClampedArray(width * height);
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            gray[i / 4] = (0.299 * r + 0.587 * g + 0.114 * b) | 0;
          }
          const out = new Uint8ClampedArray(width * height);
          const checkerMask = checkerOnly.checked
            ? buildCheckerMask(
                gray,
                width,
                height,
                20,
                5,
                Number.parseFloat(checkerDensity.value)
              )
            : null;
          const gxKernel = [-1, 0, 1, -2, 0, 2, -1, 0, 1];
          const gyKernel = [1, 2, 1, 0, 0, 0, -1, -2, -1];
          const threshold = parseInt(edgeThreshold.value, 10);
          for (let y = 1; y < height - 1; y++) {
            for (let x = 1; x < width - 1; x++) {
              if (checkerMask && !checkerMask[y * width + x]) {
                continue;
              }
              let gx = 0;
              let gy = 0;
              let k = 0;
              for (let ky = -1; ky <= 1; ky++) {
                for (let kx = -1; kx <= 1; kx++) {
                  const val = gray[(y + ky) * width + (x + kx)];
                  gx += val * gxKernel[k];
                  gy += val * gyKernel[k];
                  k++;
                }
              }
              const mag = Math.sqrt(gx * gx + gy * gy);
              out[y * width + x] = mag > threshold ? 255 : 0;
            }
          }
          for (let i = 0; i < data.length; i += 4) {
            const v = out[i / 4];
            data[i] = v;
            data[i + 1] = v;
            data[i + 2] = v;
            data[i + 3] = 255;
          }
          ctx.putImageData(imageData, 0, 0);
          preview.src = canvas.toDataURL("image/png");
        };
        img.onerror = () => {
          status.textContent = "Failed to load image for edge detection.";
        };
        img.src = originalSrc || preview.src;
      });

      edgesOverlayBtn.addEventListener("click", async () => {
        if (!preview.src) {
          status.textContent = "Load an image first.";
          return;
        }
        status.textContent = "";
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => {
          const ctx = canvas.getContext("2d", { willReadFrequently: true });
          canvas.width = img.naturalWidth;
          canvas.height = img.naturalHeight;
          ctx.drawImage(img, 0, 0);
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const { data, width, height } = imageData;
          const gray = new Uint8ClampedArray(width * height);
          for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            gray[i / 4] = (0.299 * r + 0.587 * g + 0.114 * b) | 0;
          }
          const checkerMask = checkerOnly.checked
            ? buildCheckerMask(
                gray,
                width,
                height,
                20,
                5,
                Number.parseFloat(checkerDensity.value)
              )
            : null;
          const gxKernel = [-1, 0, 1, -2, 0, 2, -1, 0, 1];
          const gyKernel = [1, 2, 1, 0, 0, 0, -1, -2, -1];
          const threshold = parseInt(edgeThreshold.value, 10);
          for (let y = 1; y < height - 1; y++) {
            for (let x = 1; x < width - 1; x++) {
              if (checkerMask && !checkerMask[y * width + x]) {
                continue;
              }
              let gx = 0;
              let gy = 0;
              let k = 0;
              for (let ky = -1; ky <= 1; ky++) {
                for (let kx = -1; kx <= 1; kx++) {
                  const val = gray[(y + ky) * width + (x + kx)];
                  gx += val * gxKernel[k];
                  gy += val * gyKernel[k];
                  k++;
                }
              }
              const mag = Math.sqrt(gx * gx + gy * gy);
              if (mag > threshold) {
                const idx = (y * width + x) * 4;
                data[idx] = 0;
                data[idx + 1] = 0;
                data[idx + 2] = 0;
                data[idx + 3] = 255;
              }
            }
          }
          ctx.putImageData(imageData, 0, 0);
          preview.src = canvas.toDataURL("image/png");
        };
        img.onerror = () => {
          status.textContent = "Failed to load image for edge overlay.";
        };
        img.src = originalSrc || preview.src;
      });

      // Auto-load the newest local screenshot/image on page load; fall back to
      // the generated overlay, then the latest screenshot endpoint.
      window.addEventListener("load", async () => {
        try {
          const resp = await fetch(`/api/default-image?t=${Date.now()}`);
          if (resp.ok) {
            const blob = await resp.blob();
            const url = URL.createObjectURL(blob);
            preview.src = url;
            originalSrc = url;
            status.textContent = "";
            return;
          }
        } catch (_err) {
          // Fallback below.
        }
        try {
          const resp = await fetch(`/api/patches-overlay?t=${Date.now()}`);
          if (resp.ok) {
            const blob = await resp.blob();
            const url = URL.createObjectURL(blob);
            preview.src = url;
            originalSrc = url;
            status.textContent = "";
            return;
          }
        } catch (_err) {
          // Fallback below.
        }
        latestBtn.click();
      });
    </script>
